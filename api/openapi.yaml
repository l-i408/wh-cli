openapi: 3.1.0
info:
  title: wh-cli local API
  version: 0.1.0
  description: Local REST API served by the wh-cli daemon.
servers:
  - url: http://127.0.0.1:7777
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: Daemon is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      operationId: postAuthLogin
      security: []
      responses:
        "200":
          description: Access and refresh token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "423":
          $ref: "#/components/responses/Locked"
  /auth/refresh:
    post:
      operationId: postAuthRefresh
      responses:
        "200":
          description: Rotated access and refresh token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      operationId: postAuthLogout
      responses:
        "204":
          description: Tokens revoked.
  /session/qr:
    get:
      operationId: getSessionQR
      responses:
        "200":
          description: Server-sent QR stream.
          content:
            text/event-stream:
              schema:
                type: string
  /session/status:
    get:
      operationId: getSessionStatus
      security: []
      responses:
        "200":
          description: Current WhatsApp session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatus"
  /session/logout:
    post:
      operationId: postSessionLogout
      responses:
        "204":
          description: WhatsApp session logged out.
  /chats:
    get:
      operationId: getChats
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Chat page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatPage"
        "423":
          $ref: "#/components/responses/Locked"
  /chats/{jid}/messages:
    get:
      operationId: getChatMessages
      parameters:
        - $ref: "#/components/parameters/JID"
        - name: before
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Message page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagePage"
        "423":
          $ref: "#/components/responses/Locked"
  /messages:
    post:
      operationId: postMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "202":
          description: Message accepted for sending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
  /messages/{id}/react:
    post:
      operationId: postMessageReaction
      parameters:
        - $ref: "#/components/parameters/MessageID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactMessageRequest"
      responses:
        "204":
          description: Reaction accepted.
        "404":
          description: Source message is not available in the local store.
  /messages/{id}/reply:
    post:
      operationId: postMessageReply
      parameters:
        - $ref: "#/components/parameters/MessageID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyMessageRequest"
      responses:
        "202":
          description: Reply accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Source message is not available in the local store.
  /messages/{id}/forward:
    post:
      operationId: postMessageForward
      parameters:
        - $ref: "#/components/parameters/MessageID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardMessageRequest"
      responses:
        "202":
          description: Forward accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForwardMessageResponse"
        "404":
          description: Source message is not available in the local store.
  /contacts:
    get:
      operationId: getContacts
      responses:
        "200":
          description: Contacts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactPage"
  /contacts/{jid}:
    patch:
      operationId: patchContact
      parameters:
        - $ref: "#/components/parameters/JID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchContactRequest"
      responses:
        "200":
          description: Contact updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
  /groups:
    get:
      operationId: getGroups
      responses:
        "200":
          description: Joined groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupPage"
  /groups/{jid}:
    get:
      operationId: getGroup
      parameters:
        - $ref: "#/components/parameters/JID"
      responses:
        "200":
          description: Group metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
  /groups/{jid}/participants:
    get:
      operationId: getGroupParticipants
      parameters:
        - $ref: "#/components/parameters/JID"
      responses:
        "200":
          description: Group participants.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupParticipantPage"
  /media/upload:
    post:
      operationId: postMediaUpload
      responses:
        "201":
          description: Uploaded media blob.
  /media/{id}:
    get:
      operationId: getMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Media stream.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    JID:
      name: jid
      in: path
      required: true
      schema:
        type: string
    MessageID:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication failed or token is invalid.
    Locked:
      description: Encrypted store is locked.
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
    SessionStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [connected, qr_pending, logged_out]
    Chat:
      type: object
      required: [jid, type, display_name, unread_count]
      properties:
        jid:
          type: string
        type:
          type: string
          enum: [dm, group]
        display_name:
          type: string
        last_message_id:
          type: [string, "null"]
        unread_count:
          type: integer
    ChatPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Chat"
        next_cursor:
          type: [string, "null"]
    Message:
      type: object
      required: [id, chat_jid, sender_jid, type, timestamp]
      properties:
        id:
          type: string
        chat_jid:
          type: string
        sender_jid:
          type: string
        type:
          type: string
          enum: [text, image, document, audio]
        body:
          type: [string, "null"]
        reply_to_id:
          type: [string, "null"]
        reactions_json:
          type: [string, "null"]
        media_id:
          type: [string, "null"]
        media_path:
          type: [string, "null"]
        status:
          type: [string, "null"]
          enum: [pending, received, sent, delivered, read, failed, null]
        timestamp:
          type: string
          format: date-time
    PostMessageRequest:
      type: object
      required: [chat_jid]
      properties:
        chat_jid:
          type: string
        type:
          type: string
          enum: [text]
        body:
          type: string
          description: Required for text messages.
        file_path:
          type: string
          description: Local daemon path for an image or document.
        audio_path:
          type: string
          description: Local daemon path for an audio file.
        caption:
          type: string
          description: Optional caption for file or audio sends.
    ReactMessageRequest:
      type: object
      required: [emoji]
      properties:
        chat_jid:
          type: string
          description: Optional client-side assertion; the daemon resolves the chat from the stored message.
        emoji:
          type: string
          description: Emoji reaction to send.
    ReplyMessageRequest:
      type: object
      required: [body]
      properties:
        chat_jid:
          type: string
          description: Optional client-side assertion; the daemon resolves the chat from the stored message.
        type:
          type: string
          enum: [text]
        body:
          type: string
    ForwardMessageRequest:
      type: object
      required: [to_jids]
      properties:
        to_jids:
          type: array
          minItems: 1
          items:
            type: string
    ForwardMessageResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Message"
    MessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        next_cursor:
          type: [string, "null"]
    Contact:
      type: object
      required: [jid, display_name, updated_at]
      properties:
        jid:
          type: string
        push_name:
          type: string
        agenda_name:
          type: string
        alias:
          type: string
        avatar_path:
          type: string
        display_name:
          type: string
        updated_at:
          type: string
          format: date-time
    ContactPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
    PatchContactRequest:
      type: object
      required: [alias]
      properties:
        alias:
          type: string
    Group:
      type: object
      required: [jid, name, updated_at]
      properties:
        jid:
          type: string
        name:
          type: string
        topic:
          type: string
        owner_jid:
          type: string
        owner_display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GroupPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Group"
    GroupParticipant:
      type: object
      required: [group_jid, contact_jid, display_name, role]
      properties:
        group_jid:
          type: string
        contact_jid:
          type: string
        display_name:
          type: string
        role:
          type: string
        phone_jid:
          type: string
        lid_jid:
          type: string
    GroupParticipantPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupParticipant"
