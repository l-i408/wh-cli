asyncapi: 3.0.0
info:
  title: wh-cli WebSocket events
  version: 0.1.0
channels:
  ws:
    address: /ws
    messages:
      messageNew:
        $ref: "#/components/messages/messageNew"
      chatUpdated:
        $ref: "#/components/messages/chatUpdated"
      messageReaction:
        $ref: "#/components/messages/messageReaction"
      sessionConnected:
        $ref: "#/components/messages/sessionConnected"
components:
  messages:
    messageNew:
      name: message.new
      payload:
        $ref: "#/components/schemas/Event"
    chatUpdated:
      name: chat.updated
      payload:
        $ref: "#/components/schemas/Event"
    messageReaction:
      name: message.reaction
      payload:
        $ref: "#/components/schemas/Event"
    sessionConnected:
      name: session.connected
      payload:
        $ref: "#/components/schemas/Event"
  schemas:
    Event:
      type: object
      required: [id, type, ts, payload]
      properties:
        id:
          type: string
        type:
          type: string
        ts:
          type: string
          format: date-time
        chat_jid:
          type: string
        payload:
          type: object
